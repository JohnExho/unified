<!-- Remove User from Team Modal -->
<div id="removeUserTeamModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Remove User from Team</h2>
            <button type="button" class="modal-close" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <form id="remove-user-team-form" method="post" action="">
            {% csrf_token %}
            
            <div style="padding: 20px;">
                <p style="margin: 0 0 16px; color: #374151; font-size: 14px;">
                    Are you sure you want to remove <strong id="remove-user-name"></strong> from <strong id="remove-team-name"></strong>?
                </p>
                <p style="margin: 0; color: #f97316; font-size: 13px;">
                    ℹ️ This user will no longer be assigned to tasks in this team.
                </p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary modal-close">Cancel</button>
                <button type="submit" class="btn btn-warning">Remove User</button>
            </div>
        </form>
    </div>
</div>

<style>
.btn-warning {
    background-color: #f97316;
    color: white;
}

.btn-warning:hover {
    background-color: #ea580c;
}
</style>
