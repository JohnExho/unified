<!-- Update Terms of Service Modal -->
<div id="updateTosModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Update Terms of Service</h2>
            <button type="button" class="modal-close" onclick="closeTosModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="tosForm" method="POST" action="{% url 'projectmanagement:update_tos' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="tosContent">Terms of Service Content</label>
                    <textarea id="tosContent" name="tos_text" rows="15" required placeholder="Enter the terms of service content here...">{{ tos_text }}</textarea>
                </div>
                <div class="alert alert-info">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <span>Changes to the Terms of Service will be visible to all new users.</span>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeTosModal()">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="saveTosChanges()">Save Changes</button>
        </div>
    </div>
</div>


<style>

    align-items: center;
    justify-content: center;
}

.modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background-color: #fff;
    border-radius: 10px;
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    overflow-y: auto;

    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
}

    border-bottom: 1px solid #e5e7eb;

    align-items: center;
}

.modal-header h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    color: #111827;
}

.modal-close {
    background: none;
    border: none;
    font-size: 24px;
    color: #6b7280;
    cursor: pointer;

    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;

}

.modal-close:hover {

.form-group label {

    font-size: 14px;
    font-weight: 600;
    color: #374151;

.form-group textarea {

.alert-info {

</style>
