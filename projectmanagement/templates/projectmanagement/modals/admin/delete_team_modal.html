<!-- Delete Team Modal -->
<div id="deleteTeamModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Delete Team</h2>
            <button type="button" class="modal-close" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <form id="delete-team-form" method="post" action="">
            {% csrf_token %}
            
            <div style="padding: 20px;">
                <p style="margin: 0 0 16px; color: #374151; font-size: 14px;">
                    Are you sure you want to delete the team <strong id="delete-team-name"></strong>?
                </p>
                <p style="margin: 0; color: #dc2626; font-size: 13px;">
                    ⚠️ This action cannot be undone. All team assignments will be removed.
                </p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary modal-close">Cancel</button>
                <button type="submit" class="btn btn-danger">Delete Team</button>
            </div>
        </form>
    </div>
</div>

<style>
.btn-danger {
    background-color: #dc2626;
    color: white;
}

.btn-danger:hover {
    background-color: #b91c1c;
}
</style>
