<!-- Delete Task Confirmation Modal -->
<div id="delete-task-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Delete Task</h2>
            <button type="button" class="modal-close" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <form id="delete-task-form" method="post" enctype="application/x-www-form-urlencoded">
            {% csrf_token %}
            
            <div class="modal-body">
                <div style="padding: 20px; text-align: center;">
                    <div style="width: 60px; height: 60px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: #dc2626;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </div>
                    <h3 style="margin: 0 0 8px; font-size: 18px; color: #1a202c; font-weight: 600;">
                        Delete <span id="delete-task-name"></span>?
                    </h3>
                    <p style="margin: 0; font-size: 14px; color: #718096; line-height: 1.5;">
                        This action cannot be undone. The task will be permanently deleted.
                    </p>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary modal-close">Cancel</button>
                <button type="submit" class="btn btn-danger">Delete Task</button>
            </div>
        </form>
    </div>
</div>

<style>
.btn-danger {
    background-color: #dc2626;
    color: white;
}

.btn-danger:hover {
    background-color: #b91c1c;
}

.modal-body {
    padding: 0;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const deleteTaskModal = document.getElementById('delete-task-modal');
    const deleteTaskForm = document.getElementById('delete-task-form');
    const closeButtons = deleteTaskModal.querySelectorAll('.modal-close');

    // Close modal
    closeButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            deleteTaskModal.classList.remove('show');
        });
    });

    // Close on outside click
    deleteTaskModal.addEventListener('click', function(e) {
        if (e.target === deleteTaskModal) {
            deleteTaskModal.classList.remove('show');
        }
    });

    // Form submission
    deleteTaskForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const taskId = deleteTaskForm.dataset.taskId;

        fetch(`/researchmanagement/tasks/${taskId}/delete/`, {
            method: 'POST',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            },
        })
        .then(response => {
            if (response.ok) {
                deleteTaskModal.classList.remove('show');
                Swal.fire({
                    icon: 'success',
                    title: 'Task Deleted',
                    text: 'The task has been successfully deleted.',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 1500,
                    timerProgressBar: true
                }).then(() => {
                    location.reload();
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Failed to delete the task.',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true
                });
            }
        })
        .catch(error => {
            console.error('Error:', error);
            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: 'An error occurred while deleting the task.',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000,
                timerProgressBar: true
            });
        });
    });

    // Expose function to open modal
    window.openDeleteTaskModal = function(taskId, taskName) {
        deleteTaskForm.dataset.taskId = taskId;
        document.getElementById('delete-task-name').textContent = `"${taskName}"`;
        deleteTaskModal.classList.add('show');
    };
});
</script>
