<div class="stat-card">
  <div class="stat-icon stat-icon-projects">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
    </svg>
  </div>
  <div class="stat-content">
    <div class="stat-label">Research</div>
    <div class="stat-value">{{ total_projects_count }}</div>
  </div>
</div>

<div class="stat-card">
  <div class="stat-icon stat-icon-tasks">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 11l3 3L22 4"></path>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
    </svg>
  </div>
  <div class="stat-content">
    <div class="stat-label">Tasks</div>
    <div class="stat-value">{{ total_tasks_count }}</div>
  </div>
</div>

<div class="stat-card">
  <div class="stat-icon stat-icon-late-projects">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <polyline points="12 6 12 12 16 14"></polyline>
    </svg>
  </div>
  <div class="stat-content">
    <div class="stat-label">Late Research</div>
    <div class="stat-value">{{ late_projects_count }}</div>
  </div>
</div>

<div class="stat-card">
  <div class="stat-icon stat-icon-late-tasks">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <polyline points="12 6 12 12 16 14"></polyline>
    </svg>
  </div>
  <div class="stat-content">
    <div class="stat-label">Late Tasks</div>
    <div class="stat-value">{{ late_tasks_count }}</div>
  </div>
</div>
