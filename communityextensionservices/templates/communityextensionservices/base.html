{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="{% block meta_description %}KNS FEA Membership and Decision Support System for faculty & employee associations.{% endblock meta_description %}" />
    <meta name="keywords"
          content="{% block meta_keywords %}KNS FEA, membership, dues, analytics, decision support, machine learning{% endblock meta_keywords %}" />
    <title>
      {% block title %}
        KNS FEA Membership System
      {% endblock title %}
    </title>
    <style>
      :root {
        --bg: #0f1115;
        --surface: #171a21;
        --surface-2: #1f2430;
        --card: #1b1f29;
        --border: rgba(255, 255, 255, 0.08);
        --accent: #35d0ba;
        --accent-2: #ff9f6e;
        --text: #f8fafc;
        --muted: #9aa4b2;
        --success: #4ade80;
        --warning: #fbbf24;
        --danger: #f87171;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, rgba(53, 208, 186, 0.12), transparent 55%),
                    radial-gradient(circle at bottom left, rgba(255, 159, 110, 0.12), transparent 55%),
                    var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      a { color: inherit; text-decoration: none; }

      .layout-ces {
        display: grid;
        grid-template-columns: 300px 1fr;
        min-height: 100vh;
      }

      .content-ces {
        padding: 36px 42px 56px;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .page-title { font-size: 28px; font-weight: 700; }
      .page-subtitle { color: var(--muted); margin-top: 6px; }

      .grid { display: grid; gap: 18px; }
      .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

      .card {
        background: linear-gradient(160deg, var(--surface), var(--card));
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 22px 50px rgba(0, 0, 0, 0.35);
      }

      .stat-value { font-size: 26px; font-weight: 700; margin-top: 10px; }
      .muted { color: var(--muted); }
      .text-small { font-size: 12px; }
      .text-strong { font-weight: 600; }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }
      .badge.success { color: var(--success); }
      .badge.warning { color: var(--warning); }
      .badge.danger { color: var(--danger); }

      .button {
        padding: 10px 16px;
        border-radius: 12px;
        border: 1px solid transparent;
        background: var(--accent);
        color: #052b2a;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .button.secondary {
        background: transparent;
        border-color: var(--border);
        color: var(--text);
      }
      .button:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(53, 208, 186, 0.2); }

      .table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      .table th,
      .table td {
        text-align: left;
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .table th { color: var(--muted); font-weight: 600; }

      .form-card { max-width: 900px; }
      .form-grid { display: grid; gap: 16px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form-field { display: grid; gap: 6px; font-size: 13px; }
      .form-field input,
      .form-field select,
      .form-field textarea {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        padding: 10px;
      }
      .form-field textarea { min-height: 100px; }
      .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

      .ces-sidebar {
        background: linear-gradient(180deg, #11131a, #141925);
        border-right: 1px solid var(--border);
        padding: 28px 22px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .ces-brand {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .ces-logo {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: rgba(53, 208, 186, 0.16);
        color: var(--accent);
      }

      .ces-brand h2 { font-size: 18px; }
      .ces-brand p { color: var(--muted); font-size: 12px; }

      .ces-nav { display: flex; flex-direction: column; gap: 18px; }
      .nav-block { display: grid; gap: 8px; }
      .nav-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
      .nav-item {
        display: grid;
        gap: 4px;
        padding: 12px 14px;
        border-radius: 14px;
        background: transparent;
        border: 1px solid transparent;
        transition: 0.2s ease;
      }
      .nav-item span { font-weight: 600; }
      .nav-item small { color: var(--muted); }
      .nav-item.active,
      .nav-item:hover {
        border-color: rgba(53, 208, 186, 0.4);
        background: rgba(53, 208, 186, 0.08);
      }

      .nav-section {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .nav-section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .nav-section ul {
        list-style: none;
        display: grid;
        gap: 10px;
        padding: 0;
      }

      .nav-section a {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid transparent;
        transition: 0.2s ease;
      }

      .nav-section a:hover {
        border-color: rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
      }

      .nav-icon {
        width: 18px;
        height: 18px;
      }

      .sidebar-footer {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        display: grid;
        gap: 12px;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-avatar {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
        display: grid;
        place-items: center;
        font-size: 12px;
      }

      .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

      .logout-form { margin: 0; }
      .logout-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        padding: 10px 12px;
        cursor: pointer;
      }

      .split {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
      }

      .chip {
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 11px;
      }

      .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
      .bar {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
      }
      .bar > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      @media (max-width: 1100px) {
        .layout-ces { grid-template-columns: 1fr; }
        .ces-sidebar { position: sticky; top: 0; z-index: 10; }
      }
    </style>
  </head>
  <body>
    <div class="layout-ces">
      {% include "communityextensionservices/components/sidebar.html" %}
      <main class="content-ces">
        {% block content %}
        {% endblock content %}
      </main>
    </div>
  </body>
</html>
