<div class="modal" id="editEvaluationCommentModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Comment</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="" id="editEvaluationCommentForm" data-modal-id="#editEvaluationCommentModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editCommentEvaluation">Evaluation</label>
                        <select id="editCommentEvaluation" name="evaluation" required>
                            <option value="">Select evaluation</option>
                            {% for evaluation in evaluation_options %}
                                <option value="{{ evaluation.id }}">{{ evaluation.evaluatee.get_full_name|default:evaluation.evaluatee.username }} ({{ evaluation.form.get_evaluator_type_display }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editCommentText">Comment</label>
                        <textarea id="editCommentText" name="comment" rows="4" required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
