<div class="modal" id="addRubricModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Rubric</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="{% url 'performanceevaluation:add_rubric' %}" id="addRubricForm" data-modal-id="#addRubricModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="addRubricCriterion">Criterion</label>
                        <select id="addRubricCriterion" name="criterion" required>
                            <option value="">Select criterion</option>
                            {% for criteria in evaluation_criteria %}
                                <option value="{{ criteria.id }}">{{ criteria.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addRubricLevel">Level</label>
                        <input type="number" id="addRubricLevel" name="level" min="1" required />
                    </div>
                    <div class="form-group">
                        <label for="addRubricDescription">Description</label>
                        <textarea id="addRubricDescription" name="description" required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Add Rubric</button>
                </div>
            </form>
        </div>
    </div>
</div>
