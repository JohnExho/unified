<div class="modal" id="editEvaluationCategoryModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Evaluation Category</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="#" id="editEvaluationCategoryForm" data-modal-id="#editEvaluationCategoryModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editCategoryCycle">Evaluation Cycle</label>
                        <select id="editCategoryCycle" name="cycle" required>
                            <option value="">Select cycle</option>
                            {% for cycle in evaluation_cycles %}
                                <option value="{{ cycle.id }}">{{ cycle.term.name }} - {{ cycle.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editCategoryName">Category Name</label>
                        <input type="text" id="editCategoryName" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="editCategoryWeight">Weight</label>
                        <input type="number" step="0.01" id="editCategoryWeight" name="weight" value="0" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Update Category</button>
                </div>
            </form>
        </div>
    </div>
</div>
