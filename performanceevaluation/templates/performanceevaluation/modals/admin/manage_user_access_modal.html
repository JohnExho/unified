<div class="modal" id="manageAccessModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Manage User Access</h3>
            <button type="button" class="modal-close" onclick="closeManageAccessModal()">&times;</button>
        </div>
        <form id="manageAccessForm" method="post">
            {% csrf_token %}
            <div class="modal-body">
                <label for="accessUsername">Username</label>
                <input type="text" id="accessUsername" name="username" readonly />

                <label for="systemRole">Role</label>
                <select id="systemRole" name="system_role" required>
                    <option value="user">User</option>
                    <option value="instructor">Instructor</option>
                    <option value="admin">Admin</option>
                    <option value="superadmin">Superadmin</option>
                </select>

                <label for="departmentSelect">Department</label>
                <select id="departmentSelect" name="department">
                    <option value="">Select a department</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-outline" onclick="closeManageAccessModal()">Cancel</button>
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
