<div class="modal" id="editEvaluationScoreModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Score</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="" id="editEvaluationScoreForm" data-modal-id="#editEvaluationScoreModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editScoreEvaluation">Evaluation</label>
                        <select id="editScoreEvaluation" name="evaluation" required>
                            <option value="">Select evaluation</option>
                            {% for evaluation in evaluation_options %}
                                <option value="{{ evaluation.id }}">{{ evaluation.evaluatee.get_full_name|default:evaluation.evaluatee.username }} ({{ evaluation.form.get_evaluator_type_display }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editScoreCriterion">Criterion</label>
                        <select id="editScoreCriterion" name="criterion" required>
                            <option value="">Select criterion</option>
                            {% for criterion in criteria %}
                                <option value="{{ criterion.id }}">{{ criterion.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editScoreValue">Score</label>
                        <input type="number" id="editScoreValue" name="score" min="1" max="5" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
