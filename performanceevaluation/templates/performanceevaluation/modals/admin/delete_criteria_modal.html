<div class="modal" id="deleteCriteriaModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Delete Criteria</h3>
            <button type="button" class="modal-close" onclick="closeDeleteCriteriaModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p class="delete-warning">
                Are you sure you want to delete <strong id="deleteCriteriaName"></strong>?
            </p>
            <p class="text-muted">This action cannot be undone. Any evaluations using this criteria will be affected.</p>
        </div>
        <div class="modal-actions">
            <form id="deleteCriteriaForm" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="button" class="btn-outline" onclick="closeDeleteCriteriaModal()">Cancel</button>
                <button type="submit" class="btn-danger">Delete</button>
            </form>
        </div>
    </div>
</div>
