<div class="modal" id="addEvaluationCommentModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Comment</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="{% url 'performanceevaluation:add_evaluation_comment' %}" id="addEvaluationCommentForm" data-modal-id="#addEvaluationCommentModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="addCommentEvaluation">Evaluation</label>
                        <select id="addCommentEvaluation" name="evaluation" required>
                            <option value="">Select evaluation</option>
                            {% for evaluation in evaluation_options %}
                                <option value="{{ evaluation.id }}">{{ evaluation.evaluatee.get_full_name|default:evaluation.evaluatee.username }} ({{ evaluation.form.get_evaluator_type_display }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addCommentText">Comment</label>
                        <textarea id="addCommentText" name="comment" rows="4" required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Add Comment</button>
                </div>
            </form>
        </div>
    </div>
</div>
