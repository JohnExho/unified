<div class="modal" id="viewReportModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Report Details</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <div class="detail-row">
                    <span class="detail-label">Evaluatee</span>
                    <span class="detail-value" id="reportEvaluatee"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Cycle</span>
                    <span class="detail-value" id="reportCycle"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total Score</span>
                    <span class="detail-value" id="reportScore"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Performance Level</span>
                    <span class="detail-value" id="reportLevel"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Computed At</span>
                    <span class="detail-value" id="reportComputed"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Recommendations</span>
                    <span class="detail-value" id="reportRecommendations"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
