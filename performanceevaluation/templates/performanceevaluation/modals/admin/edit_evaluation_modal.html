<div class="modal" id="editEvaluationModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Evaluation</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="" id="editEvaluationForm" data-modal-id="#editEvaluationModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editEvaluationFormSelect">Evaluation Form</label>
                        <select id="editEvaluationFormSelect" name="form" required>
                            <option value="">Select form</option>
                            {% for form in evaluation_forms %}
                                <option value="{{ form.id }}">{{ form.cycle.term.name }} - {{ form.cycle.name }} ({{ form.get_evaluator_type_display }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editEvaluatee">Evaluatee</label>
                        <select id="editEvaluatee" name="evaluatee" required>
                            <option value="">Select evaluatee</option>
                            {% for user in users %}
                                <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editEvaluator">Evaluator (optional)</label>
                        <select id="editEvaluator" name="evaluator">
                            <option value="">None</option>
                            {% for user in users %}
                                <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editSubmittedAt">Submitted At (optional)</label>
                        <input type="datetime-local" id="editSubmittedAt" name="submitted_at">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="editIsSubmitted" name="is_submitted" /> Submitted
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
