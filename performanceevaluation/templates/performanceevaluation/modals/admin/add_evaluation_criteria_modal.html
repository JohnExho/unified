<div class="modal" id="addEvaluationCriteriaModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Evaluation Criteria</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="{% url 'performanceevaluation:add_evaluation_criteria' %}" id="addEvaluationCriteriaForm" data-modal-id="#addEvaluationCriteriaModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="addCriteriaCategory">Category</label>
                        <select id="addCriteriaCategory" name="category" required>
                            <option value="">Select category</option>
                            {% for category in evaluation_categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addCriteriaName">Criteria Name</label>
                        <input type="text" id="addCriteriaName" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="addCriteriaDescription">Description</label>
                        <textarea id="addCriteriaDescription" name="description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="addCriteriaWeight">Weight</label>
                        <input type="number" step="0.01" id="addCriteriaWeight" name="weight" value="0" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Add Criteria</button>
                </div>
            </form>
        </div>
    </div>
</div>
