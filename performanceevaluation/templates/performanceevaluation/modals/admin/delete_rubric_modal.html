<div class="modal" id="deleteRubricModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Rubric</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="#" id="deleteRubricForm" data-modal-id="#deleteRubricModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <p>Are you sure you want to delete <strong id="deleteRubricName"></strong>?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-danger">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
