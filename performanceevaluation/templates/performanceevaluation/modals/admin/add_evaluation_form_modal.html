<div class="modal" id="addEvaluationFormModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Evaluation Form</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="{% url 'performanceevaluation:add_evaluation_form' %}" id="addEvaluationForm" data-modal-id="#addEvaluationFormModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="addFormCycle">Evaluation Cycle</label>
                        <select id="addFormCycle" name="cycle" required>
                            <option value="">Select cycle</option>
                            {% for cycle in evaluation_cycles %}
                                <option value="{{ cycle.id }}">{{ cycle.term.name }} - {{ cycle.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addFormEvaluatorType">Evaluator Type</label>
                        <select id="addFormEvaluatorType" name="evaluator_type" required>
                            <option value="">Select type</option>
                            {% for value, label in evaluator_types %}
                                <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group" id="teacherSubjectGroup" style="display: none;">
                        <label for="addFormTeacherSubject">Teacher Subject (Student Evaluations)</label>
                        <select id="addFormTeacherSubject" name="teacher_subject_assignment">
                            <option value="">All Teachers</option>
                            {% for assignment in teacher_subjects %}
                                <option value="{{ assignment.id }}">{{ assignment.teacher.get_full_name|default:assignment.teacher.username }} - {{ assignment.subject_name }}</option>
                            {% endfor %}
                        </select>
                        <small>Optional: Limit this form to specific teacher-subject combinations</small>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="is_active" checked /> Active
                        </label>
                    </div>
                    <script>
                        document.getElementById('addFormEvaluatorType').addEventListener('change', function() {
                            const group = document.getElementById('teacherSubjectGroup');
                            group.style.display = this.value === 'student' ? 'block' : 'none';
                        });
                    </script>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Add Form</button>
                </div>
            </form>
        </div>
    </div>
</div>
