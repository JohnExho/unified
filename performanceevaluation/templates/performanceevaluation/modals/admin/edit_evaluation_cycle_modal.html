<div class="modal fade" id="editEvaluationCycleModal" tabindex="-1" role="dialog" aria-labelledby="editEvaluationCycleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editEvaluationCycleModalLabel">Edit Evaluation Cycle</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form method="post" action="" id="editCycleForm" data-update-target="tabs-content" data-modal-id="#editEvaluationCycleModal">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editCycleAcademicTerm">Academic Term</label>
                        <select class="form-control" id="editCycleAcademicTerm" name="term" required>
                            <option value="">Select an academic term</option>
                            {% for term in academic_terms %}
                                <option value="{{ term.id }}">{{ term.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editCycleName">Cycle Name</label>
                        <input type="text" class="form-control" id="editCycleName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="editCycleStartDate">Start Date</label>
                        <input type="date" class="form-control" id="editCycleStartDate" name="start_date" required>
                    </div>
                    <div class="form-group">
                        <label for="editCycleEndDate">End Date</label>
                        <input type="date" class="form-control" id="editCycleEndDate" name="end_date" required>
                    </div>
                    <div class="form-group">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="editCycleIsClosed" name="is_closed">
                            <label for="editCycleIsClosed">Mark as Closed</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Cycle</button>
                </div>
            </form>
        </div>
    </div>
</div>
