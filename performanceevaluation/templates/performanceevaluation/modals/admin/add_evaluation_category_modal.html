<div class="modal" id="addEvaluationCategoryModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Evaluation Category</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="{% url 'performanceevaluation:add_evaluation_category' %}" id="addEvaluationCategoryForm" data-modal-id="#addEvaluationCategoryModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="addCategoryCycle">Evaluation Cycle</label>
                        <select id="addCategoryCycle" name="cycle" required>
                            <option value="">Select cycle</option>
                            {% for cycle in evaluation_cycles %}
                                <option value="{{ cycle.id }}">{{ cycle.term.name }} - {{ cycle.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addCategoryName">Category Name</label>
                        <input type="text" id="addCategoryName" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="addCategoryWeight">Weight</label>
                        <input type="number" step="0.01" id="addCategoryWeight" name="weight" value="0" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Add Category</button>
                </div>
            </form>
        </div>
    </div>
</div>
