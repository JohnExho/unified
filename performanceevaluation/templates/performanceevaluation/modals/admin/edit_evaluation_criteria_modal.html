<div class="modal" id="editEvaluationCriteriaModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Evaluation Criteria</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form method="post" action="#" id="editEvaluationCriteriaForm" data-modal-id="#editEvaluationCriteriaModal" data-ajax="true">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editCriteriaCategory">Category</label>
                        <select id="editCriteriaCategory" name="category" required>
                            <option value="">Select category</option>
                            {% for category in evaluation_categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editCriteriaName">Criteria Name</label>
                        <input type="text" id="editCriteriaName" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="editCriteriaDescription">Description</label>
                        <textarea id="editCriteriaDescription" name="description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editCriteriaWeight">Weight</label>
                        <input type="number" step="0.01" id="editCriteriaWeight" name="weight" value="0" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-submit">Update Criteria</button>
                </div>
            </form>
        </div>
    </div>
</div>
