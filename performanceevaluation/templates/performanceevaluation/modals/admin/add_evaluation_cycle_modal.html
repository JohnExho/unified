<div class="modal fade" id="addEvaluationCycleModal" tabindex="-1" role="dialog" aria-labelledby="addEvaluationCycleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addEvaluationCycleModalLabel">Add Evaluation Cycle</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form method="post" action="{% url 'performanceevaluation:add_evaluation_cycle' %}" id="addCycleForm" data-update-target="tabs-content" data-modal-id="#addEvaluationCycleModal">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="cycleAcademicTerm">Academic Term *</label>
                        <select class="form-control" id="cycleAcademicTerm" name="term" required>
                            <option value="">Select an academic term</option>
                            {% for term in academic_terms %}
                                <option value="{{ term.id }}">{{ term.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cycleName">Cycle Name (e.g., Midyear, End-of-Term)</label>
                        <input type="text" class="form-control" id="cycleName" name="name" required placeholder="e.g., Midyear Evaluation">
                    </div>
                    <div class="form-group">
                        <label for="cycleStartDate">Start Date</label>
                        <input type="date" class="form-control" id="cycleStartDate" name="start_date" required>
                    </div>
                    <div class="form-group">
                        <label for="cycleEndDate">End Date</label>
                        <input type="date" class="form-control" id="cycleEndDate" name="end_date" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Cycle</button>
                </div>
            </form>
        </div>
    </div>
</div>
