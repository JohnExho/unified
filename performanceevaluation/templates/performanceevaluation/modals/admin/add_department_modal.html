<div class="modal fade" id="addDepartmentModal" tabindex="-1" role="dialog" aria-labelledby="addDepartmentModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addDepartmentModalLabel">Add Department</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form method="post" action="{% url 'performanceevaluation:add_department' %}" id="addDepartmentForm" data-update-target="tabs-content" data-modal-id="#addDepartmentModal">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="departmentName">Department Name</label>
                        <input type="text" class="form-control" id="departmentName" name="name" required placeholder="e.g., Computer Science">
                    </div>
                    <div class="form-group">
                        <label for="departmentCode">Department Code</label>
                        <input type="text" class="form-control" id="departmentCode" name="code" required placeholder="e.g., CS, MATH, ENG">
                    </div>
                    <div class="form-group">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="departmentIsActive" name="is_active" checked>
                            <label for="departmentIsActive">Active</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Department</button>
                </div>
            </form>
        </div>
    </div>
</div>
