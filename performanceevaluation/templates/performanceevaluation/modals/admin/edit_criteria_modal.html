<div class="modal" id="editCriteriaModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Edit Evaluation Criteria</h3>
            <button type="button" class="modal-close" onclick="closeEditCriteriaModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="editCriteriaForm" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="editCriteriaName">Criteria Name</label>
                    <input type="text" id="editCriteriaName" name="name" required />
                </div>
                <div class="form-group">
                    <label for="editCriteriaCategory">Category</label>
                    <select id="editCriteriaCategory" name="category" required>
                        <option value="">-- Select Category --</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="editCriteriaDescription">Description</label>
                    <textarea id="editCriteriaDescription" name="description" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="editCriteriaWeight">Weight</label>
                    <input type="number" id="editCriteriaWeight" name="weight" step="0.01" min="0" />
                </div>
            </form>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn-outline" onclick="closeEditCriteriaModal()">Cancel</button>
            <button type="submit" class="btn-primary" form="editCriteriaForm">Save Changes</button>
        </div>
    </div>
</div>
