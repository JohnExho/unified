<div id="addressModal" class="modal hidden">
  <div class="modal-content">
    <h2 class="text-xl font-semibold mb-4">Update Addresses</h2>
    <form id="addressForm" method="post" action="{% url 'performanceevaluation:save_addresses' %}">
      {% csrf_token %}

      <div class="grid grid-cols-2 gap-6">
        <div>
          <h3 class="font-medium text-lg mb-2">Home Address</h3>

          <label for="country1">Country</label>
          <input type="text" id="country1" name="country1"
                 value="{{ home_address.country|default:'' }}" required />

          <label for="address1">Full Address</label>
          <input type="text" id="address1" name="address1"
                 value="{{ home_address.full_address|default:'' }}" required />

          <div class="grid grid-cols-3 gap-2">
            <input type="text" name="city1" placeholder="City"
                   value="{{ home_address.city|default:'' }}" required />
            <input type="text" name="province1" placeholder="Province"
                   value="{{ home_address.province|default:'' }}" required />
            <input type="text" name="zip1" placeholder="ZIP Code"
                   value="{{ home_address.postal_code|default:'' }}" required />
          </div>
        </div>

        <div>
          <h3 class="font-medium text-lg mb-2">Billing Address (optional)</h3>

          <label for="country2">Country</label>
          <input type="text" id="country2" name="country2"
                 value="{{ secondary_address.country|default:'' }}" />

          <div id="address2Fields"
               class="space-y-2 {% if not secondary_address %}hidden{% endif %}">
            <input type="text" name="address2" placeholder="Full Address"
                   value="{{ secondary_address.full_address|default:'' }}" />
            <div class="grid grid-cols-3 gap-2">
              <input type="text" name="city2" placeholder="City"
                     value="{{ secondary_address.city|default:'' }}" />
              <input type="text" name="province2" placeholder="Province"
                     value="{{ secondary_address.province|default:'' }}" />
              <input type="text" name="zip2" placeholder="ZIP Code"
                     value="{{ secondary_address.postal_code|default:'' }}" />
            </div>
          </div>
        </div>

      </div>

      <div class="flex justify-end gap-2 mt-6">
        <button type="button" id="closeModal" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Both Addresses</button>
      </div>
    </form>
  </div>
</div>
