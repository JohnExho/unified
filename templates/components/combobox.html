<div class="combobox {{ combobox_class|default:'' }}">
  <button type="button"
          class="combobox-trigger"
          id="{{ combobox_id }}_trigger"
          aria-expanded="false"
          aria-controls="{{ combobox_id }}_content"
          {% if combobox_disabled %}disabled{% endif %}
          onclick="toggleCombobox('{{ combobox_id }}')">
    <span class="combobox-value">{{ combobox_placeholder|default:"Search..." }}</span>
    <svg width="15"
         height="15"
         viewBox="0 0 15 15"
         fill="none"
         xmlns="http://www.w3.org/2000/svg">
      <path d="M4.93179 5.43179C4.75605 5.60753 4.75605 5.89245 4.93179 6.06819C5.10753 6.24392 5.39245 6.24392 5.56819 6.06819L7.49999 4.13638L9.43179 6.06819C9.60753 6.24392 9.89245 6.24392 10.0682 6.06819C10.2439 5.89245 10.2439 5.60753 10.0682 5.43179L7.81819 3.18179C7.73379 3.0974 7.61933 3.04999 7.49999 3.04999C7.38064 3.04999 7.26618 3.0974 7.18179 3.18179L4.93179 5.43179ZM10.0682 9.56819C10.2439 9.39245 10.2439 9.10753 10.0682 8.93179C9.89245 8.75606 9.60753 8.75606 9.43179 8.93179L7.49999 10.8636L5.56819 8.93179C5.39245 8.75606 5.10753 8.75606 4.93179 8.93179C4.75605 9.10753 4.75605 9.39245 4.93179 9.56819L7.18179 11.8182C7.35753 11.9939 7.64245 11.9939 7.81819 11.8182L10.0682 9.56819Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd">
      </path>
    </svg>
  </button>
  <div class="combobox-content" id="{{ combobox_id }}_content">
    <div class="combobox-search">
      <input type="text"
             class="combobox-search-input"
             placeholder="{{ combobox_search_placeholder|default:'Type to search...' }}"
             oninput="filterComboboxOptions('{{ combobox_id }}', this.value)" />
    </div>
    <div class="combobox-list">
      {% for option in combobox_options %}
        <div class="combobox-item"
             data-value="{{ option.value }}"
             onclick="selectComboboxOption('{{ combobox_id }}', '{{ option.value }}', '{{ option.text|escapejs }}', {{ combobox_multi|default:false|lower }})">
          {% if combobox_multi %}
            <input type="checkbox"
                   name="{{ combobox_name }}"
                   value="{{ option.value }}"
                   {% if option.value == combobox_value %}checked{% endif %}>
          {% endif %}
          {{ option.text }}
        </div>
      {% endfor %}
      <div class="combobox-empty">{{ combobox_empty_text|default:"No results found" }}</div>
    </div>
  </div>
  {% if not combobox_multi %}
    <input type="hidden"
           name="{{ combobox_name }}"
           id="{{ combobox_id }}"
           value="{{ combobox_value|default:'' }}" />
  {% endif %}
</div>
<script>
  function toggleCombobox(id) {
    const content = document.getElementById(id + '_content');
    const trigger = document.getElementById(id + '_trigger');
    const isOpen = content.style.display === 'block';

    content.style.display = isOpen ? 'none' : 'block';
    trigger.setAttribute('aria-expanded', !isOpen);
  }

  function selectComboboxOption(id, value, text, isMulti) {
    if (!isMulti) {
      document.getElementById(id).value = value;
      document.getElementById(id + '_trigger').querySelector('.combobox-value').textContent = text;
      toggleCombobox(id);
    }
  }

  function filterComboboxOptions(id, searchTerm) {
    const content = document.getElementById(id + '_content');
    const items = content.querySelectorAll('.combobox-item');
    const empty = content.querySelector('.combobox-empty');
    let hasResults = false;

    items.forEach(item => {
      const text = item.textContent.toLowerCase();
      const matches = text.includes(searchTerm.toLowerCase());
      item.style.display = matches ? 'flex' : 'none';
      if (matches) hasResults = true;
    });

    empty.style.display = hasResults ? 'none' : 'block';
  }

  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.combobox')) {
      document.querySelectorAll('.combobox-content').forEach(content => {
        content.style.display = 'none';
        const id = content.id.replace('_content', '');
        document.getElementById(id + '_trigger')?.setAttribute('aria-expanded', 'false');
      });
    }
  });
</script>
