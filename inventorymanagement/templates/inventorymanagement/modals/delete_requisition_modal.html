<div id="deleteRequisitionModal" class="modal">
	<div class="modal-content modal-small">
		<div class="modal-header">
			<h2>Delete Requisition</h2>
			<button type="button" class="modal-close" onclick="closeModal('deleteRequisitionModal')">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<line x1="18" y1="6" x2="6" y2="18"></line>
					<line x1="6" y1="6" x2="18" y2="18"></line>
				</svg>
			</button>
		</div>
		<form onsubmit="return false;">
			{% csrf_token %}
			<div class="modal-body">
				<p>Are you sure you want to delete this requisition? This action cannot be undone.</p>
			</div>
			<div class="form-actions">
				<button type="button" class="btn btn-secondary" onclick="closeModal('deleteRequisitionModal')">Cancel</button>
				<button type="button" class="btn btn-danger" id="confirmDeleteRequisitionBtn" onclick="confirmDeleteRequisition()">Delete</button>
			</div>
		</form>
	</div>
</div>

<script>
let _deleteRequisitionUrl = '';

function openDeleteRequisitionModal(requisitionId) {
	_deleteRequisitionUrl = `{% url 'inventorymanagement:delete_requisition' '00000000-0000-0000-0000-000000000000' %}`.replace('00000000-0000-0000-0000-000000000000', requisitionId);
	document.getElementById('deleteRequisitionModal').style.display = 'flex';
}

function confirmDeleteRequisition() {
	const btn = document.getElementById('confirmDeleteRequisitionBtn');
	btn.disabled = true;
	btn.textContent = 'Deleting...';

	const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');

	fetch(_deleteRequisitionUrl, {
		method: 'POST',
		headers: {
			'X-CSRFToken': csrfToken ? csrfToken.value : '{{ csrf_token }}',
			'X-Requested-With': 'XMLHttpRequest',
		},
	})
	.then(res => res.json())
	.then(data => {
		if (data.success) {
			window.location.href = '{% url "inventorymanagement:requisitions" %}';
		} else {
			alert('Error: ' + (data.error || 'Could not delete requisition.'));
			btn.disabled = false;
			btn.textContent = 'Delete';
		}
	})
	.catch(() => {
		alert('Network error. Please try again.');
		btn.disabled = false;
		btn.textContent = 'Delete';
	});
}
</script>
