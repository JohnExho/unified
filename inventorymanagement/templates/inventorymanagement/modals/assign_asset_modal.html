<div id="assignAssetModal" class="modal">
	<div class="modal-content">
		<div class="modal-header">
			<h2>Assign Asset</h2>
			<button type="button" class="modal-close" onclick="closeModal('assignAssetModal')">&times;</button>
		</div>
		<form id="assignAssetForm" onsubmit="submitAssignAssetForm(event)">
			{% csrf_token %}
			<input type="hidden" id="assignAssetId" name="asset_id" />
			<div class="form-group">
				<label for="assignUser">Assign To (User)</label>
				<select id="assignUser" name="user">
					<option value="">Select user...</option>
				</select>
			</div>
			<div class="form-group">
				<label for="assignToName">Person / Office Name *</label>
				<input type="text" id="assignToName" name="assigned_to_name" placeholder="e.g. Office of the Dean / Juan Dela Cruz" required>
			</div>
			<div class="form-group">
				<label for="assignRemarks">Remarks</label>
				<textarea id="assignRemarks" name="remarks" placeholder="Any additional notes..." rows="3"></textarea>
			</div>
			<div class="form-actions">
				<button type="button" class="btn btn-secondary" onclick="closeModal('assignAssetModal')">Cancel</button>
				<button type="submit" class="btn btn-primary">Assign Asset</button>
			</div>
		</form>
	</div>
</div>

<script>
function openAssignAssetModal(assetId) {
	document.getElementById('assignAssetId').value = assetId;
	document.getElementById('assignAssetForm').reset();
	loadAssignUsers();
	document.getElementById('assignAssetModal').style.display = 'flex';
}

function loadAssignUsers() {
	fetch('{% url "inventorymanagement:get_system_members" %}')
		.then(response => response.json())
		.then(data => {
			const userSelect = document.getElementById('assignUser');
			userSelect.innerHTML = '<option value="">Select user...</option>';
			data.users.forEach(user => {
				const option = document.createElement('option');
				option.value = user.id;
				option.textContent = user.full_name || user.username;
				userSelect.appendChild(option);
			});
		})
		.catch(error => console.error('Error loading users:', error));
}

function submitAssignAssetForm(event) {
	event.preventDefault();
	const assetId = document.getElementById('assignAssetId').value;
	const formData = new FormData(document.getElementById('assignAssetForm'));
	const url = `/inventorymanagement/asset/assign/${assetId}/`;
	
	fetch(url, {
		method: 'POST',
		body: formData,
		headers: {
			'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
		}
	})
	.then(response => response.json())
	.then(data => {
		if (data.success) {
			closeModal('assignAssetModal');
			location.reload();
		} else {
			alert('Error: ' + (data.error || 'Failed to assign asset'));
		}
	})
	.catch(error => console.error('Error:', error));
}
</script>
