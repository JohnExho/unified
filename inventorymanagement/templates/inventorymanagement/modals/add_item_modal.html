<!-- Add Inventory Item Modal -->
<div id="addItemModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Add New Item</h2>
      <button class="close-btn" onclick="closeAddItemModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="addItemForm" method="post" action="{% url 'inventorymanagement:create_item' %}">
        {% csrf_token %}
        
        <!-- Item Name -->
        <div class="input-wrapper">
          <label for="itemName">Item Name *</label>
          <input 
            type="text" 
            id="itemName"
            name="name" 
            placeholder="Enter item name" 
            required 
          />
        </div>

        <!-- Category -->
        <div class="input-wrapper">
          <label for="itemCategory">Category *</label>
          <select id="itemCategory" name="category" required>
            <option value="">Select Category</option>
          </select>
        </div>

        <!-- Unit -->
        <div class="input-wrapper">
          <label for="itemUnit">Unit *</label>
          <input 
            type="text" 
            id="itemUnit"
            name="unit" 
            placeholder="e.g. pcs, box, liter" 
            required 
          />
        </div>

        <!-- Quantity -->
        <div class="input-wrapper">
          <label for="itemQuantity">Quantity</label>
          <input 
            type="number" 
            id="itemQuantity"
            name="quantity" 
            placeholder="Enter quantity" 
            value="0"
            min="0"
          />
        </div>

        <!-- Low Stock Threshold -->
        <div class="input-wrapper">
          <label for="lowStockThreshold">Low Stock Threshold</label>
          <input 
            type="number" 
            id="lowStockThreshold"
            name="low_stock_threshold" 
            placeholder="Enter threshold" 
            value="5"
            min="0"
          />
        </div>

        <!-- Description -->
        <div class="input-wrapper">
          <label for="itemDescription">Description</label>
          <textarea 
            id="itemDescription"
            name="description" 
            placeholder="Enter item description"
            rows="3"
          ></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <div class="modal-buttons">
        <button type="button" class="btn-cancel" onclick="closeAddItemModal()">Cancel</button>
        <button type="submit" form="addItemForm" class="btn-accept">Create Item</button>
      </div>
    </div>
  </div>
</div>

<style>
#addItemModal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(6px);
  animation: fadeIn 0.3s ease;
}

#addItemModal.show {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  border-radius: 16px;
  width: 90%;
  max-width: 700px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  animation: slideUp 0.3s ease-out;
}

.modal-header {
  padding: 25px 30px;
  border-bottom: 2px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
  border-radius: 16px 16px 0 0;
}

.modal-header h2 {
  margin: 0;
  color: #111827;
  font-size: 22px;
  font-weight: 700;
}

.close-btn {
  background: none;
  border: none;
  font-size: 32px;
  color: #6b7280;
  cursor: pointer;
  padding: 0;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: all 0.2s ease;
}

.close-btn:hover {
  background: rgba(17, 24, 39, 0.1);
  color: #111827;
}

.modal-body {
  padding: 30px;
  overflow-y: auto;
  flex: 1;
}

.input-wrapper {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.input-wrapper label {
  font-size: 14px;
  font-weight: 600;
  color: #111827;
}

.input-wrapper input,
.input-wrapper select,
.input-wrapper textarea {
  padding: 12px;
  border: 2px solid #d1d5db;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
}

.input-wrapper input:focus,
.input-wrapper select:focus,
.input-wrapper textarea:focus {
  border-color: #111827;
  outline: none;
  box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.1);
}

.modal-footer {
  padding: 20px 30px;
  border-top: 2px solid #e2e8f0;
  background: #f8f9fa;
  border-radius: 0 0 16px 16px;
}

.modal-buttons {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.btn-cancel,
.btn-accept {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-cancel {
  background: #e5e7eb;
  color: #374151;
}

.btn-cancel:hover {
  background: #d1d5db;
}

.btn-accept {
  background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(17, 24, 39, 0.3);
}

.btn-accept:hover {
  background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
  transform: translateY(-2px);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

<script>
function openAddItemModal() {
  const modal = document.getElementById('addItemModal');
  if (modal) {
    // Reset form
    document.getElementById('addItemForm').reset();
    
    // Load categories
    loadAddCategories();
    
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
}

function loadAddCategories() {
  fetch('/inventorymanagement/api/categories/')
    .then(response => response.json())
    .then(data => {
      const categorySelect = document.getElementById('itemCategory');
      
      // Clear existing options except the first one
      while (categorySelect.options.length > 1) {
        categorySelect.remove(1);
      }
      
      // Add categories
      if (data.categories && data.categories.length > 0) {
        data.categories.forEach(category => {
          const option = document.createElement('option');
          option.value = category.id;
          option.textContent = category.name;
          categorySelect.appendChild(option);
        });
      }
    })
    .catch(error => {
      console.error('Error loading categories:', error);
    });
}

function closeAddItemModal() {
  const modal = document.getElementById('addItemModal');
  if (modal) {
    modal.classList.remove('show');
    document.body.style.overflow = 'auto';
    document.getElementById('addItemForm').reset();
  }
}

// Close modal when clicking outside
window.addEventListener('click', function(event) {
  const modal = document.getElementById('addItemModal');
  if (event.target === modal) {
    closeAddItemModal();
  }
});

// Close modal with Escape key
document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') {
    const modal = document.getElementById('addItemModal');
    if (modal && modal.classList.contains('show')) {
      closeAddItemModal();
    }
  }
});

// Handle form submission
document.getElementById('addItemForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  
  fetch("{% url 'inventorymanagement:create_item' %}", {
    method: 'POST',
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      closeAddItemModal();
      location.reload();
    } else {
      alert('Error: ' + data.error);
    }
  })
  .catch(error => {
    alert('Error: ' + error);
  });
});
</script>
