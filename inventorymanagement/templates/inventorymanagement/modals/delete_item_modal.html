<!-- Delete Item Confirmation Modal -->
<div id="deleteItemModal" class="modal">
  <div class="modal-content confirmation-modal">
    <div class="modal-header">
      <h2>Delete Item</h2>
      <button class="close-btn" onclick="closeDeleteItemModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="confirmation-message">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <h3>Are you sure?</h3>
        <p id="deleteItemMessage">This action cannot be undone. The item will be permanently deleted.</p>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-buttons">
        <button type="button" class="btn-cancel" onclick="closeDeleteItemModal()">Cancel</button>
        <button type="button" class="btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<style>
#deleteItemModal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(6px);
  animation: fadeIn 0.3s ease;
}

#deleteItemModal.show {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  border-radius: 16px;
  width: 90%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  animation: slideUp 0.3s ease-out;
}

.confirmation-modal {
  max-width: 450px;
}

.modal-header {
  padding: 25px 30px;
  border-bottom: 2px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
  border-radius: 16px 16px 0 0;
}

.modal-header h2 {
  margin: 0;
  color: #dc2626;
  font-size: 22px;
  font-weight: 700;
}

.close-btn {
  background: none;
  border: none;
  font-size: 32px;
  color: #6b7280;
  cursor: pointer;
  padding: 0;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: all 0.2s ease;
}

.close-btn:hover {
  background: rgba(17, 24, 39, 0.1);
  color: #111827;
}

.modal-body {
  padding: 40px 30px;
}

.confirmation-message {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.confirmation-message svg {
  flex-shrink: 0;
}

.confirmation-message h3 {
  margin: 0;
  color: #111827;
  font-size: 18px;
  font-weight: 700;
}

.confirmation-message p {
  margin: 0;
  color: #6b7280;
  font-size: 14px;
  line-height: 1.6;
}

.modal-footer {
  padding: 20px 30px;
  border-top: 2px solid #e2e8f0;
  background: #f8f9fa;
  border-radius: 0 0 16px 16px;
}

.modal-buttons {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.btn-cancel,
.btn-danger {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-cancel {
  background: #e5e7eb;
  color: #374151;
}

.btn-cancel:hover {
  background: #d1d5db;
}

.btn-danger {
  background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
}

.btn-danger:hover {
  background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

<script>
let itemToDelete = null;

function openDeleteItemModal(itemId, itemName) {
  itemToDelete = itemId;
  document.getElementById('deleteItemMessage').textContent = `Are you sure you want to delete "${itemName}"? This action cannot be undone.`;
  const modal = document.getElementById('deleteItemModal');
  if (modal) {
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
}

function closeDeleteItemModal() {
  const modal = document.getElementById('deleteItemModal');
  if (modal) {
    modal.classList.remove('show');
    document.body.style.overflow = 'auto';
    itemToDelete = null;
  }
}

document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
  if (itemToDelete) {
    const formData = new FormData();
    formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
    
    fetch(`/inventorymanagement/inventory/delete/${itemToDelete}/`, {
      method: 'POST',
      body: formData
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        closeDeleteItemModal();
        location.reload();
      } else {
        alert('Error: ' + data.error);
      }
    })
    .catch(error => {
      alert('Error: ' + error);
    });
  }
});

// Close modal when clicking outside
window.addEventListener('click', function(event) {
  const modal = document.getElementById('deleteItemModal');
  if (event.target === modal) {
    closeDeleteItemModal();
  }
});

// Close modal with Escape key
document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') {
    const modal = document.getElementById('deleteItemModal');
    if (modal && modal.classList.contains('show')) {
      closeDeleteItemModal();
    }
  }
});
</script>
