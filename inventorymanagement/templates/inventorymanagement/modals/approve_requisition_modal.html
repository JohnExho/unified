<div id="approveRequisitionModal" class="modal">
	<div class="modal-content modal-small">
		<div class="modal-header">
			<h2>Approve Requisition</h2>
			<button type="button" class="modal-close" onclick="closeModal('approveRequisitionModal')">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<line x1="18" y1="6" x2="6" y2="18"></line>
					<line x1="6" y1="6" x2="18" y2="18"></line>
				</svg>
			</button>
		</div>
		<form id="approveRequisitionForm" method="post">
			{% csrf_token %}
			<div class="modal-body">
				<p>Approve this requisition? It can be issued once approved.</p>
			</div>
			<div class="form-actions">
				<button type="button" class="btn btn-secondary" onclick="closeModal('approveRequisitionModal')">Cancel</button>
				<button type="submit" class="btn btn-primary">Approve</button>
			</div>
		</form>
	</div>
</div>

<script>
function openApproveRequisitionModal(requisitionId) {
	const form = document.getElementById('approveRequisitionForm');
	form.action = `{% url 'inventorymanagement:approve_requisition' '00000000-0000-0000-0000-000000000000' %}`.replace('00000000-0000-0000-0000-000000000000', requisitionId);
	document.getElementById('approveRequisitionModal').style.display = 'flex';
}
</script>
