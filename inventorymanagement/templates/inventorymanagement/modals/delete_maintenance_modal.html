<div id="deleteMaintenanceModal" class="modal">
	<div class="modal-content modal-small modal-confirmation">
		<div class="modal-header">
			<h2>Delete Maintenance Record</h2>
			<button type="button" class="modal-close" onclick="closeModal('deleteMaintenanceModal')">&times;</button>
		</div>
		<div style="padding: 24px;">
			<p>Are you sure you want to delete this maintenance record?</p>
			<p class="warning-text">This action cannot be undone.</p>
			<div class="form-actions" style="margin-top: 24px;">
				<button type="button" class="btn btn-secondary" onclick="closeModal('deleteMaintenanceModal')">Cancel</button>
				<button type="button" class="btn btn-primary" style="background: #dc2626; border-color: #dc2626;" onclick="confirmDeleteMaintenance()">Delete</button>
			</div>
		</div>
	</div>
</div>

<script>
let maintenanceToDelete = null;

function openDeleteMaintenanceModal(maintenanceId, assetId) {
	maintenanceToDelete = { id: maintenanceId, assetId: assetId };
	document.getElementById('deleteMaintenanceModal').style.display = 'flex';
}

function confirmDeleteMaintenance() {
	if (!maintenanceToDelete) return;
	
	const url = `/inventorymanagement/asset-maintenance/${maintenanceToDelete.id}/delete/`;
	
	fetch(url, {
		method: 'POST',
		headers: {
			'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
		}
	})
	.then(response => response.json())
	.then(data => {
		if (data.success) {
			closeModal('deleteMaintenanceModal');
			loadAssetMaintenance(maintenanceToDelete.assetId);
		} else {
			alert('Error: ' + (data.error || 'Failed to delete maintenance record'));
		}
	})
	.catch(error => console.error('Error:', error));
}
</script>
