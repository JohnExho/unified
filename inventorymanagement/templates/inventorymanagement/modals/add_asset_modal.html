<div id="addAssetModal" class="modal">
	<div class="modal-content">
		<div class="modal-header">
			<h2>Add Asset</h2>
			<button type="button" class="modal-close" onclick="closeModal('addAssetModal')">&times;</button>
		</div>
		<form id="addAssetForm" onsubmit="submitAddAssetForm(event)">
			{% csrf_token %}
			<div class="form-group">
				<label for="assetCode">Asset Code *</label>
				<input type="text" id="assetCode" name="asset_code" placeholder="e.g., AST-001" required />
			</div>
			<div class="form-group">
				<label for="assetName">Asset Name *</label>
				<input type="text" id="assetName" name="name" placeholder="e.g., Laptop" required />
			</div>
			<div class="form-group">
				<label for="assetCategory">Category *</label>
				<select id="assetCategory" name="category" required>
					<option value="">Select category...</option>
				</select>
			</div>
			<div class="form-group">
				<label for="assetDescription">Description</label>
				<textarea id="assetDescription" name="description" placeholder="Asset description..." rows="3"></textarea>
			</div>
			<div class="form-actions">
				<button type="button" class="btn btn-secondary" onclick="closeModal('addAssetModal')">Cancel</button>
				<button type="submit" class="btn btn-primary">Add Asset</button>
			</div>
		</form>
	</div>
</div>

<script>
function openAddAssetModal() {
	document.getElementById('addAssetForm').reset();
	loadAddAssetCategories();
	document.getElementById('addAssetModal').style.display = 'flex';
}

function loadAddAssetCategories() {
	fetch('{% url "inventorymanagement:get_asset_categories" %}')
		.then(response => response.json())
		.then(data => {
			const categorySelect = document.getElementById('assetCategory');
			categorySelect.innerHTML = '<option value="">Select category...</option>';
			data.categories.forEach(category => {
				const option = document.createElement('option');
				option.value = category.id;
				option.textContent = category.name;
				categorySelect.appendChild(option);
			});
		})
		.catch(error => console.error('Error loading categories:', error));
}

function submitAddAssetForm(event) {
	event.preventDefault();
	const formData = new FormData(document.getElementById('addAssetForm'));
	
	fetch('{% url "inventorymanagement:create_asset" %}', {
		method: 'POST',
		body: formData,
		headers: {
			'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
		}
	})
	.then(response => response.json())
	.then(data => {
		if (data.success) {
			closeModal('addAssetModal');
			location.reload();
		} else {
			alert('Error: ' + (data.error || 'Failed to create asset'));
		}
	})
	.catch(error => console.error('Error:', error));
}
</script>
