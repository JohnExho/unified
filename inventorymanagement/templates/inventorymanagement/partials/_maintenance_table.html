<div class="maintenance-section">
	<div class="maintenance-header">
		<h3>Maintenance History</h3>
		{% if is_admin %}
		<button class="btn btn-secondary" onclick="openAddMaintenanceModal(currentAssetId)">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
				<line x1="12" y1="5" x2="12" y2="19"></line>
				<line x1="5" y1="12" x2="19" y2="12"></line>
			</svg>
			Add Record
		</button>
		{% endif %}
	</div>
	
	<div id="maintenanceTableContainer">
		<div style="text-align: center; padding: 32px; color: #6b7280;">
			<p>Loading maintenance records...</p>
		</div>
	</div>
</div>

<script>
let currentAssetId = null;
let isAdmin = {% if is_admin %}true{% else %}false{% endif %};

function loadAssetMaintenance(assetId) {
	currentAssetId = assetId;
	const url = `/inventorymanagement/asset/${assetId}/maintenance/`;
	
	fetch(url, {
		method: 'GET',
		headers: {
			'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
		}
	})
	.then(response => response.json())
	.then(data => {
		const container = document.getElementById('maintenanceTableContainer');
		
		if (!data.maintenance || data.maintenance.length === 0) {
			container.innerHTML = '<div style="text-align: center; padding: 32px; color: #6b7280;"><p>No maintenance records found</p></div>';
			return;
		}
		
		let html = `
			<table class="inventory-table">
				<thead>
					<tr>
						<th>Date</th>
						<th>Description</th>
						<th>Performed By</th>
						${isAdmin ? '<th>Actions</th>' : ''}
					</tr>
				</thead>
				<tbody>
		`;
		
		data.maintenance.forEach(record => {
			let actionsHtml = '';
			if (isAdmin) {
				actionsHtml = `
					<td class="actions">
						<button class="icon-btn" title="Edit" onclick="openEditMaintenanceModal('${record.id}', '${currentAssetId}', '${record.description.replace(/'/g, "\\'")}', '${record.maintenance_date}', '${record.performed_by || ''}')">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M12 20h9"></path>
								<path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
							</svg>
						</button>
						<button class="icon-btn danger" title="Delete" onclick="openDeleteMaintenanceModal('${record.id}', '${currentAssetId}')">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<polyline points="3 6 5 6 21 6"></polyline>
								<path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
								<path d="M10 11v6"></path>
								<path d="M14 11v6"></path>
								<path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
							</svg>
						</button>
					</td>
				`;
			}
			
			html += `
				<tr>
					<td>${record.maintenance_date}</td>
					<td>${record.description.substring(0, 100)}${record.description.length > 100 ? '...' : ''}</td>
					<td>${record.performed_by || '-'}</td>
					${actionsHtml}
				</tr>
			`;
		});
		
		html += `
				</tbody>
			</table>
		`;
		
		container.innerHTML = html;
	})
	.catch(error => console.error('Error loading maintenance:', error));
}
</script>
