{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="{% block meta_description %}CESO Information System for Community Extension and Linkages.{% endblock meta_description %}" />
    <meta name="keywords"
          content="{% block meta_keywords %}CESO information system, community extension, linkages, analytics, machine learning{% endblock meta_keywords %}" />
    <title>
      {% block title %}
        CESO Information System
      {% endblock title %}
    </title>
    <style>
    :root {
      --bg: #0b1120;
      --panel: #10172a;
      --panel-light: #111c36;
      --card: #121a33;
      --card-border: #1f2a44;
      --accent: #4f46e5;
      --accent-2: #06b6d4;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, #0b1120 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    a { color: inherit; text-decoration: none; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      width: 100%;
    }

    aside {
      overflow-y: auto;
    }

    .content {
      padding: 32px 40px 48px;
    }

    .mt-4 { margin-top: 4px; }
    .mt-24 { margin-top: 24px; }
    .text-strong { font-weight: 600; }
    .text-small { font-size: 12px; }
    .text-right { text-align: right; }
    .flex-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
    .grid-span-2 { grid-column: span 2; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 600;
    }

    .page-subtitle {
      color: var(--muted);
      margin-top: 6px;
    }

    .action-group {
      display: flex;
      gap: 12px;
    }

    .button {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button.secondary {
      background: transparent;
      border-color: var(--card-border);
      color: var(--text);
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.2);
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card {
      background: linear-gradient(180deg, var(--card), var(--panel));
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.35);
    }

    .panel-card {
      background: var(--panel);
    }

    .card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card p {
      color: var(--muted);
      font-size: 13px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      margin-top: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(148, 163, 184, 0.16);
      color: var(--muted);
    }

    .badge.success { background: rgba(34, 197, 94, 0.16); color: #86efac; }
    .badge.warning { background: rgba(245, 158, 11, 0.16); color: #facc15; }
    .badge.danger { background: rgba(239, 68, 68, 0.16); color: #fecaca; }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .table th,
    .table td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--card-border);
      font-size: 13px;
    }

    .table th { color: var(--muted); font-weight: 600; }

    .table-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .link-btn {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      font-size: 12px;
      color: var(--text);
      background: rgba(15, 23, 42, 0.6);
    }

    .link-btn.danger {
      border-color: rgba(239, 68, 68, 0.6);
      color: #fecaca;
    }

    .inline-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .empty-state {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--card-border);
      border-radius: 12px;
    }

    .progress {
      height: 8px;
      background: #1f2937;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .progress-native {
      width: 100%;
      height: 8px;
      appearance: none;
      border: none;
      border-radius: 999px;
      overflow: hidden;
      background: #1f2937;
    }

    .progress-native::-webkit-progress-bar {
      background: #1f2937;
      border-radius: 999px;
    }

    .progress-native::-webkit-progress-value {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
    }

    .progress-native::-moz-progress-bar {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .tag {
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(79, 70, 229, 0.18);
      color: #c7d2fe;
      font-size: 12px;
      font-weight: 600;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .list-item {
      background: var(--panel-light);
      border: 1px solid var(--card-border);
      padding: 14px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .nav-section {
      margin-top: 20px;
    }

    .nav-section-title {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-section ul {
      list-style: none;
      display: grid;
      gap: 10px;
      padding-left: 0;
    }

    .nav-section a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(15, 23, 42, 0.65);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .nav-section a:hover {
      transform: translateY(-1px);
      border-color: rgba(79, 70, 229, 0.5);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
    }

    .nav-text h3 {
      font-size: 13px;
      font-weight: 600;
    }

    .nav-text p {
      font-size: 11px;
      color: var(--muted);
    }

    .sidebar-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
    }

    .logout-form {
      margin-top: 12px;
    }

    .logout-btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(15, 23, 42, 0.75);
      color: var(--text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(79, 70, 229, 0.2);
      display: grid;
      place-items: center;
      font-weight: 600;
    }

    .avatar-placeholder {
      font-size: 13px;
      color: #c7d2fe;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
    }

    .muted { color: var(--muted); }

    .pill {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: rgba(15, 23, 42, 0.6);
      font-size: 12px;
      color: var(--muted);
    }

    .sector-pill { border-color: var(--card-border); }
    .sector-education { border-color: #3b82f6; color: #3b82f6; }
    .sector-health { border-color: #22c55e; color: #22c55e; }
    .sector-livelihood { border-color: #f59e0b; color: #f59e0b; }
    .sector-environment { border-color: #10b981; color: #10b981; }
    .sector-governance { border-color: #a855f7; color: #a855f7; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .form-card {
      max-width: 860px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: rgba(15, 23, 42, 0.6);
      color: var(--text);
      font-size: 14px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .form-actions .button.secondary {
      text-align: center;
    }

    .sidebar-shell {
      height: 100vh;
      border-radius: 0;
      border-left: none;
      border-top: none;
      border-bottom: none;
      position: sticky;
      top: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 18px;
    }

    .sidebar-logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
    }

    .sidebar-title {
      font-weight: 700;
    }

    .sidebar-subtitle {
      font-size: 12px;
    }

    .sidebar-stack {
      display: grid;
      gap: 14px;
    }

    .sidebar-section-label {
      font-size: 12px;
      margin-bottom: 8px;
    }

    .sidebar-footer-wrap {
      margin-top: 24px;
    }

    /* ====================================================================== */
    /* New Contribution & Financial Management Styles */
    /* ====================================================================== */

    .stat-box {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--card-border);
    }

    .stat-item:last-child {
      border-bottom: none;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 12px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--card-border);
    }

    .detail-row.grid-span-2 {
      grid-column: span 2;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .detail-value {
      color: var(--text);
      font-size: 14px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--card-border);
    }

    .section-title h3 {
      margin: 0;
    }

    .section-title p {
      margin: 4px 0 0 0;
    }

    .pill {
      display: inline-block;
      padding: 6px 12px;
      background: var(--panel-light);
      border-radius: 999px;
      font-size: 12px;
      color: var(--text);
      border: 1px solid var(--card-border);
    }

    .mb-24 {
      margin-bottom: 24px;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .details-grid {
        grid-template-columns: 1fr;
      }

      .detail-row {
        grid-template-columns: 1fr;
      }

      .detail-row.grid-span-2 {
        grid-column: 1;
      }

      .grid.cols-3,
      .grid.cols-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .content { padding: 24px; }
    }
    </style>
    {% block extra_head %}
    {% endblock extra_head %}
  </head>
  <body>
    <div class="layout">
      {% include "informationmanagement/sidebar.html" %}
      <main class="content">
        {% block content %}
        {% endblock content %}
      </main>
    </div>
    {% block extra_scripts %}
    {% endblock extra_scripts %}
  </body>
</html>
