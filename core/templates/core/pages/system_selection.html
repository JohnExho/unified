<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select a System</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: relative;
        overflow: hidden;
        padding: 20px;
      }

      body::before {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        top: -250px;
        right: -250px;
        animation: float 8s ease-in-out infinite;
      }

      body::after {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        bottom: -200px;
        left: -200px;
        animation: float 10s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 48px 40px;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 600px;
        position: relative;
        z-index: 1;
        animation: slideIn 0.6s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .logo {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 16px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: white;
        font-weight: bold;
        box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
      }

      h1 {
        color: #1a202c;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .subtitle {
        color: #718096;
        font-size: 16px;
      }

      .systems-grid {
        display: grid;
        gap: 16px;
        margin-bottom: 24px;
      }

      .system-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px 24px;
        background: white;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        text-decoration: none;
        color: inherit;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        animation: fadeIn 0.5s ease-out both;
      }

      .system-card:nth-child(1) {
        animation-delay: 0.1s;
      }
      .system-card:nth-child(2) {
        animation-delay: 0.2s;
      }
      .system-card:nth-child(3) {
        animation-delay: 0.3s;
      }
      .system-card:nth-child(4) {
        animation-delay: 0.4s;
      }
      .system-card:nth-child(5) {
        animation-delay: 0.5s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .system-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transform: scaleY(0);
        transform-origin: bottom;
        transition: transform 0.3s ease;
      }

      .system-card:hover::before {
        transform: scaleY(1);
        transform-origin: top;
      }

      .system-card:hover {
        border-color: #667eea;
        transform: translateX(8px);
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
      }

      .system-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      }

      .system-icon svg {
        width: 24px;
        height: 24px;
        color: white;
      }

      .system-info {
        flex: 1;
      }

      .system-name {
        font-size: 18px;
        font-weight: 600;
        color: #1a202c;
        margin-bottom: 4px;
      }

      .system-description {
        font-size: 14px;
        color: #718096;
      }

      .arrow {
        color: #cbd5e0;
        transition: all 0.3s ease;
      }

      .system-card:hover .arrow {
        color: #667eea;
        transform: translateX(4px);
      }

      /* Large Desktop - 1200px and up */
      @media (min-width: 1200px) {
        .container {
          max-width: 700px;
        }

        .systems-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 20px;
        }
      }

      /* Desktop - 992px to 1199px */
      @media (min-width: 992px) and (max-width: 1199px) {
        .container {
          max-width: 600px;
        }
      }

      /* Tablet - 768px to 991px */
      @media (min-width: 768px) and (max-width: 991px) {
        .container {
          max-width: 500px;
          padding: 40px 32px;
        }

        h1 {
          font-size: 26px;
        }

        .subtitle {
          font-size: 15px;
        }

        .system-card {
          padding: 18px 22px;
        }

        .system-icon {
          width: 44px;
          height: 44px;
        }

        .system-icon svg {
          width: 22px;
          height: 22px;
        }

        .system-name {
          font-size: 17px;
        }
      }

      /* Mobile Large - 576px to 767px */
      @media (min-width: 576px) and (max-width: 767px) {
        .container {
          max-width: 450px;
          padding: 36px 28px;
        }

        h1 {
          font-size: 24px;
        }

        .subtitle {
          font-size: 15px;
        }

        .logo {
          width: 56px;
          height: 56px;
          font-size: 26px;
        }

        .system-card {
          padding: 16px 20px;
        }

        .system-icon {
          width: 42px;
          height: 42px;
        }

        .system-icon svg {
          width: 20px;
          height: 20px;
        }

        .system-name {
          font-size: 16px;
        }

        .system-description {
          font-size: 13px;
        }
      }

      /* Mobile Medium - 480px to 575px */
      @media (min-width: 480px) and (max-width: 575px) {
        body {
          padding: 16px;
        }

        .container {
          padding: 32px 24px;
        }

        h1 {
          font-size: 22px;
        }

        .subtitle {
          font-size: 14px;
        }

        .logo {
          width: 52px;
          height: 52px;
          font-size: 24px;
          margin-bottom: 20px;
        }

        .header {
          margin-bottom: 32px;
        }

        .system-card {
          padding: 14px 18px;
          gap: 12px;
        }

        .system-icon {
          width: 40px;
          height: 40px;
        }

        .system-icon svg {
          width: 20px;
          height: 20px;
        }

        .system-name {
          font-size: 16px;
        }

        .system-description {
          font-size: 13px;
        }

        .arrow {
          width: 18px;
          height: 18px;
        }
      }

      /* Mobile Small - 320px to 479px */
      @media (max-width: 479px) {
        body {
          padding: 12px;
        }

        .container {
          padding: 28px 20px;
        }

        h1 {
          font-size: 20px;
        }

        .subtitle {
          font-size: 14px;
        }

        .logo {
          width: 48px;
          height: 48px;
          font-size: 22px;
          margin-bottom: 16px;
        }

        .header {
          margin-bottom: 28px;
        }

        .systems-grid {
          gap: 12px;
        }

        .system-card {
          padding: 14px 16px;
          gap: 12px;
        }

        .system-card:hover {
          transform: translateX(4px);
        }

        .system-icon {
          width: 36px;
          height: 36px;
        }

        .system-icon svg {
          width: 18px;
          height: 18px;
        }

        .system-name {
          font-size: 15px;
        }

        .system-description {
          font-size: 12px;
        }

        .arrow {
          width: 16px;
          height: 16px;
        }
      }

      /* Extra Small Mobile - below 360px */
      @media (max-width: 359px) {
        body {
          padding: 8px;
        }

        .container {
          padding: 24px 16px;
        }

        h1 {
          font-size: 18px;
        }

        .subtitle {
          font-size: 13px;
        }

        .logo {
          width: 44px;
          height: 44px;
          font-size: 20px;
          margin-bottom: 16px;
        }

        .header {
          margin-bottom: 24px;
        }

        .systems-grid {
          gap: 10px;
        }

        .system-card {
          padding: 12px 14px;
          gap: 10px;
        }

        .system-icon {
          width: 32px;
          height: 32px;
        }

        .system-icon svg {
          width: 16px;
          height: 16px;
        }

        .system-name {
          font-size: 14px;
          margin-bottom: 2px;
        }

        .system-description {
          font-size: 11px;
        }

        .arrow {
          width: 14px;
          height: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">S</div>
        <h1>Welcome {{ user.username }}!</h1>
        <p class="subtitle">Please select the system you want to access:</p>
      </div>

      <div class="systems-grid">
        {% for sys in systems %}
        {% if sys.url == 'core' %}
        <a href="/dashboard/" class="system-card">
        {% else %}
        <a href="/{{ sys.url }}/dashboard/" class="system-card">
        {% endif %}
          <div class="system-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
              />
            </svg>
          </div>
          <div class="system-info">
            <div class="system-name">{{ sys.name }}</div>
            <div class="system-description">Access {{ sys.name|lower }}</div>
          </div>
          <svg
            class="arrow"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </a>
        {% endfor %}
      </div>
    </div>
{% if messages %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  {% for message in messages %}
    Swal.fire({
      toast: true,
      icon: "{{ message.tags|default:'info' }}",
      title: "{{ message|escapejs }}",
      timer: 4000,
      timerProgressBar: true,
      showConfirmButton: false,
      position: "top-end"
    });
  {% endfor %}
</script>
{% endif %}
  </body>
</html>
