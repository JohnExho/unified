{% comment %} base for app {% endcomment %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Project Management{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
        <script>
        window.DJANGO_MESSAGES = [
        {% for message in messages %}
            {
                level: "{{ message.tags }}",
                text: "{{ message|escapejs }}"
            }{% if not forloop.last %},{% endif %}
        {% endfor %}
        ];
    </script>
    <script src="{% static 'core/js/global-toast.js' %}" defer></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
