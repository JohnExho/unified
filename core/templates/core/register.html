<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  position: relative;
  overflow: hidden;
  padding: 20px 0;
}

body::before {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  top: -250px;
  right: -250px;
  animation: float 8s ease-in-out infinite;
}

body::after {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  bottom: -200px;
  left: -200px;
  animation: float 10s ease-in-out infinite reverse;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}

.container {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  padding: 48px 40px;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  width: 100%;
  max-width: 480px;
  position: relative;
  z-index: 1;
  animation: slideIn 0.6s ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 16px;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: white;
  font-weight: bold;
  box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
}

h1 {
  text-align: center;
  color: #1a202c;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 32px;
}

.error {
  background: #fee;
  border-left: 4px solid #f56565;
  color: #c53030;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 24px;
  font-size: 14px;
  animation: shake 0.4s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

label {
  display: block;
  color: #2d3748;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}

.input-wrapper {
  position: relative;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 15px;
  transition: all 0.3s ease;
  background: #fff;
  outline: none;
}

input[type="password"] {
  padding-right: 48px;
}

input:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

input:hover {
  border-color: #cbd5e0;
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  color: #718096;
  transition: color 0.3s ease;
  width: auto;
  box-shadow: none;
  margin: 0;
}

.toggle-password:hover {
  color: #667eea;
  transform: translateY(-50%);
  box-shadow: none;
}

.toggle-password:active {
  transform: translateY(-50%);
}

.toggle-password svg {
  width: 20px;
  height: 20px;
  display: block;
}

.password-strength {
  margin-top: 8px;
  margin-bottom: 12px;
}

.strength-bar {
  height: 4px;
  background: #e2e8f0;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}

.strength-fill {
  height: 100%;
  width: 0%;
  transition: all 0.3s ease;
  border-radius: 2px;
}

.strength-text {
  font-size: 12px;
  color: #718096;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

button[type="submit"], button[type="button"].submit-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
  margin-top: 8px;
}

button[type="submit"]:hover, button[type="button"].submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

button[type="submit"]:active, button[type="button"].submit-btn:active {
  transform: translateY(0);
}

.footer {
  text-align: center;
  margin-top: 24px;
  color: #718096;
  font-size: 14px;
}

.footer a {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s ease;
}

.footer a:hover {
  color: #764ba2;
}

/* Modal Styles */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.3s ease;
}

.modal.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  background: white;
  border-radius: 20px;
  width: 90%;
  max-width: 600px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.modal-header {
  padding: 24px 32px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h2 {
  color: #1a202c;
  font-size: 24px;
  font-weight: 700;
}

.close-btn {
  background: none;
  border: none;
  font-size: 28px;
  color: #718096;
  cursor: pointer;
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.close-btn:hover {
  background: #f7fafc;
  color: #2d3748;
}

.modal-body {
  padding: 32px;
  overflow-y: auto;
  flex: 1;
}

.modal-body h3 {
  color: #2d3748;
  font-size: 18px;
  margin-top: 20px;
  margin-bottom: 12px;
}

.modal-body h3:first-child {
  margin-top: 0;
}

.modal-body p, .modal-body ul {
  color: #4a5568;
  line-height: 1.6;
  margin-bottom: 12px;
}

.modal-body ul {
  padding-left: 24px;
}

.modal-body li {
  margin-bottom: 8px;
}

.modal-footer {
  padding: 24px 32px;
  border-top: 1px solid #e2e8f0;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.checkbox-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 200px;
}

.checkbox-wrapper input[type="checkbox"] {
  width: 20px;
  height: 20px;
  cursor: pointer;
  margin: 0;
}

.checkbox-wrapper label {
  margin: 0;
  cursor: pointer;
  user-select: none;
  font-size: 14px;
  color: #2d3748;
}

.modal-buttons {
  display: flex;
  gap: 12px;
  width: 100%;
}

.modal-buttons button {
  flex: 1;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  border: none;
}

.btn-cancel {
  background: #e2e8f0;
  color: #2d3748;
}

.btn-cancel:hover {
  background: #cbd5e0;
}

.btn-accept {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

.btn-accept:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

.btn-accept:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Tablet */
@media (max-width: 768px) {
  .container {
    max-width: 400px;
    padding: 40px 32px;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 28px;
  }

  .logo {
    width: 56px;
    height: 56px;
    font-size: 26px;
    margin-bottom: 20px;
  }

  input {
    padding: 13px 15px;
    font-size: 14px;
  }

  button[type="submit"], button[type="button"].submit-btn {
    padding: 13px;
    font-size: 15px;
  }

  .modal-content {
    max-width: 90%;
  }

  .modal-header, .modal-body, .modal-footer {
    padding: 20px 24px;
  }

  .modal-header h2 {
    font-size: 22px;
  }

  .modal-body h3 {
    font-size: 17px;
  }
}

/* Mobile Large */
@media (max-width: 480px) {
  body::before,
  body::after {
    display: none;
  }

  .container {
    margin: 20px;
    padding: 36px 28px;
    border-radius: 20px;
  }
  
  .form-row {
    grid-template-columns: 1fr;
    gap: 0;
  }

  h1 {
    font-size: 24px;
    margin-bottom: 24px;
  }

  .logo {
    width: 52px;
    height: 52px;
    font-size: 24px;
    margin-bottom: 18px;
  }

  input {
    padding: 12px 14px;
    font-size: 14px;
    border-radius: 10px;
  }

  input[type="password"] {
    padding-right: 44px;
  }

  .toggle-password {
    right: 10px;
  }

  button[type="submit"], button[type="button"].submit-btn {
    padding: 12px;
    font-size: 15px;
    border-radius: 10px;
  }

  label {
    font-size: 13px;
  }

  .error {
    font-size: 13px;
    padding: 10px 14px;
  }

  .footer {
    margin-top: 20px;
    font-size: 13px;
  }

  .password-strength {
    margin-top: 6px;
    margin-bottom: 10px;
  }

  .strength-text {
    font-size: 11px;
  }

  .modal-content {
    max-width: 95%;
    max-height: 85vh;
    border-radius: 16px;
  }

  .modal-header {
    padding: 16px 20px;
  }

  .modal-header h2 {
    font-size: 20px;
  }

  .close-btn {
    width: 28px;
    height: 28px;
    font-size: 24px;
  }

  .modal-body {
    padding: 20px;
  }

  .modal-body h3 {
    font-size: 16px;
    margin-top: 16px;
    margin-bottom: 10px;
  }

  .modal-body p, .modal-body ul {
    font-size: 14px;
    margin-bottom: 10px;
  }

  .modal-footer {
    padding: 16px 20px;
    flex-direction: column;
  }

  .checkbox-wrapper {
    width: 100%;
    min-width: auto;
  }

  .checkbox-wrapper input[type="checkbox"] {
    width: 18px;
    height: 18px;
  }

  .checkbox-wrapper label {
    font-size: 13px;
  }

  .modal-buttons {
    flex-direction: column-reverse;
    gap: 10px;
  }

  .modal-buttons button {
    width: 100%;
    padding: 11px 20px;
    font-size: 14px;
  }
}

/* Mobile Small */
@media (max-width: 360px) {
  .container {
    margin: 16px;
    padding: 32px 24px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 20px;
  }

  .logo {
    width: 48px;
    height: 48px;
    font-size: 22px;
    margin-bottom: 16px;
  }

  input {
    padding: 11px 13px;
    font-size: 13px;
  }

  button[type="submit"], button[type="button"].submit-btn {
    padding: 11px;
    font-size: 14px;
  }

  .modal-content {
    max-width: 96%;
  }

  .modal-header h2 {
    font-size: 18px;
  }

  .modal-body h3 {
    font-size: 15px;
  }

  .modal-body p, .modal-body ul {
    font-size: 13px;
  }
}

/* Landscape Mobile */
@media (max-width: 812px) and (orientation: landscape) {
  body {
    padding: 15px 0;
  }

  .container {
    margin: 15px auto;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px 36px;
  }

  .logo {
    width: 48px;
    height: 48px;
    font-size: 22px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 20px;
  }

  .input-wrapper {
    margin-bottom: 16px;
  }

  .password-strength {
    margin-top: 6px;
    margin-bottom: 8px;
  }

  button[type="submit"], button[type="button"].submit-btn {
    margin-top: 6px;
  }

  .footer {
    margin-top: 20px;
  }

  .modal-content {
    max-height: 85vh;
  }

  .modal-header {
    padding: 16px 24px;
  }

  .modal-body {
    padding: 20px 24px;
  }

  .modal-footer {
    padding: 16px 24px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">R</div>
  <h1>Create Account</h1>
  
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  
  <form method="post" id="registerForm" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div class="form-row">
      <div>
        <label for="first_name">First Name:</label>
        <div class="input-wrapper">
          <input type="text" id="first_name" name="first_name" required>
        </div>
      </div>
      
      <div>
        <label for="middle_name">Middle Name:</label>
        <div class="input-wrapper">
          <input type="text" id="middle_name" name="middle_name">
        </div>
      </div>
    </div>
    
    <label for="last_name">Last Name:</label>
    <div class="input-wrapper">
      <input type="text" id="last_name" name="last_name" required>
    </div>
    
    <label for="email">Email:</label>
    <div class="input-wrapper">
      <input type="email" id="email" name="email" required>
    </div>
    
    <label for="username">Username:</label>
    <div class="input-wrapper">
      <input type="text" id="username" name="username" required>
    </div>
    
    <label for="avatar">Profile Picture:</label>
    <div class="input-wrapper">
      <input type="file" id="avatar" name="avatar" accept="image/*">
    </div>
    
    <label for="password">Password:</label>
    <div class="input-wrapper">
      <input type="password" id="password" name="password" required>
      <button type="button" class="toggle-password" onclick="togglePassword('password')">
        <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      </button>
    </div>
    
    <div class="password-strength">
      <div class="strength-bar">
        <div class="strength-fill" id="strengthFill"></div>
      </div>
      <div class="strength-text" id="strengthText">Enter a password</div>
    </div>
    
    <label for="password2">Confirm Password:</label>
    <div class="input-wrapper">
      <input type="password" id="password2" name="password2" required>
      <button type="button" class="toggle-password" onclick="togglePassword('password2')">
        <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      </button>
    </div>
    
    <input type="hidden" name="terms_accepted" id="termsAccepted" value="false">
    
    <button type="button" class="submit-btn" onclick="showTermsModal()">Create Account</button>
  </form>
  
  <div class="footer">
    Already have an account? <a href="{% url 'core:core_login' %}">Sign in</a>
  </div>
</div>

{% include "core/modals/terms_modal.html" %}

<script>
function togglePassword(fieldId) {
  const passwordInput = document.getElementById(fieldId);
  const eyeIcon = document.getElementById(fieldId === 'password' ? 'eyeIcon1' : 'eyeIcon2');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
  } else {
    passwordInput.type = 'password';
    eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
  }
}

// Password strength checker
const passwordInput = document.getElementById('password');
const strengthFill = document.getElementById('strengthFill');
const strengthText = document.getElementById('strengthText');

passwordInput.addEventListener('input', function() {
  const password = this.value;
  let strength = 0;
  
  if (password.length === 0) {
    strengthFill.style.width = '0%';
    strengthText.textContent = 'Enter a password';
    strengthText.style.color = '#718096';
    return;
  }
  
  if (password.length >= 8) strength += 25;
  if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength += 25;
  if (password.match(/[0-9]/)) strength += 25;
  if (password.match(/[^a-zA-Z0-9]/)) strength += 25;
  
  strengthFill.style.width = strength + '%';
  
  if (strength <= 25) {
    strengthFill.style.background = '#f56565';
    strengthText.textContent = 'Weak password';
    strengthText.style.color = '#f56565';
  } else if (strength <= 50) {
    strengthFill.style.background = '#ed8936';
    strengthText.textContent = 'Fair password';
    strengthText.style.color = '#ed8936';
  } else if (strength <= 75) {
    strengthFill.style.background = '#ecc94b';
    strengthText.textContent = 'Good password';
    strengthText.style.color = '#ecc94b';
  } else {
    strengthFill.style.background = '#48bb78';
    strengthText.textContent = 'Strong password';
    strengthText.style.color = '#48bb78';
  }
});

// Modal functions
function showTermsModal() {
  // Validate form first
  const form = document.getElementById('registerForm');
  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }
  
  // Check if passwords match
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  
  if (password !== password2) {
    alert('Passwords do not match!');
    return;
  }
  
  document.getElementById('termsModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeTermsModal() {
  document.getElementById('termsModal').classList.remove('active');
  document.getElementById('agreeCheckbox').checked = false;
  document.getElementById('acceptBtn').disabled = true;
  document.body.style.overflow = 'auto';
}

function toggleAcceptButton() {
  const checkbox = document.getElementById('agreeCheckbox');
  const acceptBtn = document.getElementById('acceptBtn');
  acceptBtn.disabled = !checkbox.checked;
}

function acceptTerms() {
  document.getElementById('termsAccepted').value = 'true';
  document.getElementById('registerForm').submit();
}

// Close modal when clicking outside
window.onclick = function(event) {
  const modal = document.getElementById('termsModal');
  if (event.target === modal) {
    closeTermsModal();
  }
}
</script>
</body>
</html>
