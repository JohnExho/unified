{# Add Author Form #}
<form id="addAuthorForm"
      method="post"
      action="{% url 'librarymanagement:add_author' %}"
      class="author-form">
  {% csrf_token %}
  {% if form.errors %}<div class="form-errors">{{ form.non_field_errors }}</div>{% endif %}
  <div class="form-group">
    <label for="first_name" class="form-label label">
      First Name <span class="text-destructive">*</span>
    </label>
    <input type="text"
           id="first_name"
           name="first_name"
           class="input input-sm"
           required
           placeholder="Enter first name" />
  </div>
  <div class="form-group">
    <label for="last_name" class="form-label label">
      Last Name <span class="text-destructive">*</span>
    </label>
    <input type="text"
           id="last_name"
           name="last_name"
           class="input input-sm"
           required
           placeholder="Enter last name" />
  </div>
  <div class="form-group">
    <label for="middle_name" class="form-label label">Middle Name</label>
    <input type="text"
           id="middle_name"
           name="middle_name"
           class="input input-sm"
           placeholder="Enter middle name (optional)" />
  </div>
  <div class="form-group">
    <label for="birth_date" class="form-label label">Birth Date</label>
    <input type="date" id="birth_date" name="birth_date" class="input input-sm" />
  </div>
  <div class="form-group">
    <label for="nationality" class="form-label label">Nationality</label>
    <input type="text"
           id="nationality"
           name="nationality"
           class="input input-sm"
           placeholder="Enter nationality" />
  </div>
  <div class="form-group">
    <label for="bio" class="form-label label">Biography</label>
    <textarea id="bio"
              name="bio"
              class="textarea textarea-sm"
              rows="4"
              placeholder="Enter author biography (optional)"></textarea>
  </div>
  <div class="modal-footer">
    <button type="button"
            class="button button-ghost"
            onclick="closeAddAuthorModal()">Cancel</button>
    <button type="submit" class="button button-primary">Add Author</button>
  </div>
</form>
