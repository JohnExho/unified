{# Add Library Form #}
<form id="addLibraryForm"
      method="post"
      action="{% url 'librarymanagement:add_library' %}"
      class="add-library-form">
  {% csrf_token %}
  <div class="form-group">
    <label for="library_name" class="label">
      Library Name <span class="required">*</span>
    </label>
    <input type="text"
           id="library_name"
           name="name"
           class="input input-sm"
           required
           placeholder="Enter library name" />
  </div>
  <div class="form-group">
    <label for="library_location" class="label">Location</label>
    <input type="text"
           id="library_location"
           name="location"
           class="input input-sm"
           placeholder="Enter library location" />
  </div>
  <div class="form-group">
    <label for="library_contact_email" class="label">Contact Email</label>
    <input type="email"
           id="library_contact_email"
           name="contact_email"
           class="input input-sm"
           placeholder="library@example.com" />
  </div>
  <div class="form-group">
    <label for="library_contact_phone" class="label">Contact Phone</label>
    <input type="tel"
           id="library_contact_phone"
           name="contact_phone"
           class="input input-sm"
           placeholder="+1 (555) 000-0000" />
  </div>
  <div class="form-group">
    <label for="library_description" class="label">Description</label>
    <textarea id="library_description"
              name="description"
              class="input input-sm"
              rows="3"
              placeholder="Enter library description"></textarea>
  </div>
  {# Footer Buttons #}
  <div class="dialog-footer">
    <button type="button"
            class="button button-ghost"
            onclick="closeDialog('addLibraryDialog')">Cancel</button>
    <button type="submit" class="button button-default">Add Library</button>
  </div>
</form>
