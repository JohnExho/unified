{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Project Management{% endblock %}</title>

    <link
      rel="stylesheet"
      href="{% static 'librarymanagement/css/base.css' %}"
    />
    <link
    rel="stylesheet"
    href="{% static 'librarymanagement/css/book_page.css' %}"
  />
    <link
      rel="stylesheet"
      href="{% static 'projectmanagement/css/base.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'projectmanagement/css/sidebar.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'projectmanagement/css/components.css' %}"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    {% block extra_head %}{% endblock %}
  </head>

  <body>
    {% block content %}
    {% include 'librarymanagement/components/sidebar.html' %}
    {% include 'librarymanagement/components/books/main.html' %}

    {% endblock%}

    <script>
      window.DJANGO_MESSAGES = [
        {% for message in messages %}
          {
            level: "{{ message.tags }}",
            text: "{{ message|escapejs }}"
          }{% if not forloop.last %},{% endif %}
        {% endfor %}
      ];
    </script>

    <script src="{% static 'core/js/sidebar.js' %}"></script>
    <script
      src="{% static 'projectmanagement/js/global-toast.js' %}"
      defer
    ></script>
  </body>
</html>
