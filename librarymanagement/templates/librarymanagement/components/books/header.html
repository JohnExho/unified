<div class="page-header">
  <div class="flex items-center justify-between mb-xl">
    <div>
      <h1 class="page-title">Books Management</h1>
      <p class="page-subtitle">Manage your library's book collection</p>
    </div>
    <div class="flex gap-md">
      <button class="btn btn-outline" onclick="exportBooks()">
        {% include "librarymanagement/components/icons/book-upload.svg" %}
        Export
      </button>
      <button class="btn btn-secondary" onclick="openAddLibraryModal()">
        {% include "librarymanagement/components/icons/books.svg" %}
        Add Library
      </button>
      <button class="btn btn-primary" onclick="openAddBookModal()">
        {% include "librarymanagement/components/icons/plus.svg" %}
        Add New Book
      </button>
    </div>
  </div>
</div>
