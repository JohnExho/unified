<div class="settings-card">
  <div class="settings-card-header">
    <h2 class="settings-card-title">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
      Account Security
    </h2>
    <p class="settings-card-description">Manage your password and security settings</p>
  </div>
  <div class="settings-card-body">
    <form method="post"
          class="settings-form-container"
          action="{% url 'librarymanagement:library_settings' %}">
      {% csrf_token %}
      <input type="hidden" name="action" value="change_password" />
      <div class="form-group">
        <label for="current_password" class="form-label label ">Current Password</label>
        <input type="password"
               id="current_password"
               name="current_password"
               class="input input-sm"
               required />
      </div>
      <div class="form-group">
        <label for="new_password" class="form-label label">New Password</label>
        <input type="password"
               id="new_password"
               name="new_password"
               class="input input-sm"
               required />
        <small class="form-text">Minimum 8 characters with letters and numbers</small>
      </div>
      <div class="form-group">
        <label for="confirm_password" class="form-label label">Confirm New Password</label>
        <input type="password"
               id="confirm_password"
               name="confirm_password"
               class="input input-sm"
               required />
      </div>
      <div class="form-actions">
        <button type="submit" class="button button-default">
          {% include "librarymanagement/components/icons/key.svg" with class="icon-sm" %}
          Change Password
        </button>
      </div>
    </form>
  </div>
</div>
