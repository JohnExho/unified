<div class="management-grid">
  <div class="management-section">
    <h2>Authors</h2>
    <table class="management-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Books</th>
        </tr>
      </thead>
      <tbody>
        {% for author in authors %}
          <tr>
            <td>{{ author.full_name }}</td>
            <td>{{ author.books.count }}</td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="2">No authors found.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="management-section">
    <h2>Publishers</h2>
    <table class="management-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Books</th>
        </tr>
      </thead>
      <tbody>
        {% for publisher in publishers %}
          <tr>
            <td>{{ publisher.name }}</td>
            <td>{{ publisher.books.count }}</td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="2">No publishers found.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
