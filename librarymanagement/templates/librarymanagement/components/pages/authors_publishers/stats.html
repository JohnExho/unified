<div class="stats-mini">
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ total_authors|default:0 }}</div>
    <div class="stat-mini-label">Total Authors</div>
  </div>
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ active_authors|default:0 }}</div>
    <div class="stat-mini-label">Active Authors</div>
  </div>
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ total_publishers|default:0 }}</div>
    <div class="stat-mini-label">Total Publishers</div>
  </div>
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ active_publishers|default:0 }}</div>
    <div class="stat-mini-label">Active Publishers</div>
  </div>
</div>
