<div class="settings-section">
  <div class="settings-section-header">
    <h3 class="settings-section-title">Fines & Fees</h3>
    <p class="settings-section-description">Configure overdue fines and penalties</p>
  </div>
  <div class="settings-item">
    <div class="settings-item-info">
      <div class="settings-item-label">Enable Late Fines</div>
      <div class="settings-item-description">Charge users for overdue books</div>
    </div>
    <div class="settings-item-control">
      <input type="checkbox"
             id="enable_fines"
             name="enable_fines"
             class="visually-hidden"
             {% if settings and settings.enable_fines %}checked{% endif %} />
      <div class="toggle-switch {% if settings and settings.enable_fines %}active{% endif %}"
           data-input="enable_fines"
           onclick="toggleSwitch(this)"></div>
    </div>
  </div>
  <div class="settings-item">
    <div class="settings-item-info">
      <div class="settings-item-label">Daily Fine Amount</div>
      <div class="settings-item-description">Fine charged per day overdue</div>
    </div>
    <div class="settings-item-control">
      <div class="input-group input-group-width-200">
        <span class="currency-prefix">₱</span>
        <input type="number"
               class="form-control currency-input"
               name="daily_fine_amount"
               min="0"
               step="0.01"
               value="{{ settings.daily_fine_amount|default:'1.00' }}" />
      </div>
    </div>
  </div>
  <div class="settings-item">
    <div class="settings-item-info">
      <div class="settings-item-label">Maximum Fine Amount</div>
      <div class="settings-item-description">Cap on total fines per book</div>
    </div>
    <div class="settings-item-control">
      <div class="input-group input-group-width-200">
        <span class="currency-prefix">₱</span>
        <input type="number"
               class="form-control currency-input"
               name="maximum_fine_amount"
               min="0"
               step="0.01"
               value="{{ settings.maximum_fine_amount|default:'50.00' }}" />
      </div>
    </div>
  </div>
  <div class="settings-item">
    <div class="settings-item-info">
      <div class="settings-item-label">Grace Period</div>
      <div class="settings-item-description">Days before fines start accumulating</div>
    </div>
    <div class="settings-item-control">
      <input type="number"
             class="form-control input-width-120"
             name="grace_period_days"
             min="0"
             value="{{ settings.grace_period_days|default:0 }}" />
    </div>
  </div>
</div>
