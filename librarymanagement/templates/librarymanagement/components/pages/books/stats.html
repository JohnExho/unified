<div class="stats-mini">
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ total_books|default:0 }}</div>
    <div class="stat-mini-label">Total Books</div>
  </div>
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ available_books|default:0 }}</div>
    <div class="stat-mini-label">Available</div>
  </div>
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ borrowed_books|default:0 }}</div>
    <div class="stat-mini-label">Borrowed</div>
  </div>
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ reserved_books|default:0 }}</div>
    <div class="stat-mini-label">Reserved</div>
  </div>
</div>
