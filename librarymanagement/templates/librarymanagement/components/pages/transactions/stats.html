<!-- Transaction Stats -->
<div class="stats-mini">
  <div class="stat-mini-card active">
    <div class="stat-mini-value">{{ active_count }}</div>
    <div class="stat-mini-label">Active Loans</div>
  </div>
  <div class="stat-mini-card overdue">
    <div class="stat-mini-value">{{ overdue_count }}</div>
    <div class="stat-mini-label">Overdue</div>
  </div>
  <div class="stat-mini-card returned">
    <div class="stat-mini-value">{{ returned_today_count }}</div>
    <div class="stat-mini-label">Returned Today</div>
  </div>
</div>
