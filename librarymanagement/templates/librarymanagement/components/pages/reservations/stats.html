<!-- Reservation Stats -->
<div class="stats-mini">
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ pending_count }}</div>
    <div class="stat-mini-label">Pending</div>
  </div>
  <div class="stat-mini-card ready">
    <div class="stat-mini-value">{{ ready_count }}</div>
    <div class="stat-mini-label">Ready</div>
  </div>
  <div class="stat-mini-card">
    <div class="stat-mini-value">{{ fulfilled_count }}</div>
    <div class="stat-mini-label">Fulfilled</div>
  </div>
  <div class="stat-mini-card expired">
    <div class="stat-mini-value">{{ expired_count }}</div>
    <div class="stat-mini-label">Expired</div>
  </div>
</div>
